version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres

  worker:
    build: .
    command: python -m app.worker
    depends_on:
      - redis
      - postgres
    deploy:
      replicas: 4

  redis:
    image: redis:7

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: jobs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password